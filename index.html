<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>开单+库存</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --primary: #4A154B;        
      --primary-hover: #360f37; 
      --accent: #ffb81c;        
      --bg-main: #f4f2f5;       
      --text-main: #1f1121;     
      --text-muted: #756676;    
      --card-bg: #ffffff;       
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); position: relative;}
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; transition: all 0.2s; }
    .back-btn:active { background: #e2dde3; transform: scale(0.97); }
    .back-btn::before { content: "←"; margin-right: 6px; font-weight: bold; font-size: 16px; }
    .editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }
    #list { width: 100%; }
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; letter-spacing: -0.5px; }
    .emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 0; }
    .emp-card { background: #faf9fa; border: 1px solid #eeeade; border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: all 0.15s ease; box-sizing: border-box; }
    .emp-card:active { background: #f3e2f5; transform: scale(0.97); }
    .store-container { padding-right: 24px; box-sizing: border-box; }
    .letter-group-title { background: #f4f2f5; color: var(--primary); font-weight: 700; font-size: 14px; padding: 4px 8px; margin: 12px 0 6px 0; border-radius: 4px; }
    .item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; width: 100%; }
    .item-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .prod-info { flex: 1; min-width: 0; }
    .prod-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .control-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 75%; }
    .picker-wrapper { display: inline-flex; align-items: center; gap: 3px; font-size: 13px; color: var(--text-muted); }
    .picker-wrapper span.label-txt { font-weight: 500; color: #665c67; }
    .picker-wrapper span.unit-txt { font-weight: 600; color: var(--text-main); font-size: 13px; }
    .ios-picker { background: #f4f2f5; color: var(--text-main); border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px 6px; font-size: 14px; font-weight: 700; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; text-align: center; min-width: 40px; }
    .ios-picker:focus { border-color: var(--primary); background: #fff; }
    .aftersale-panel { background: #fdfaf6; border: 1px dashed #f5dab1; border-radius: 8px; padding: 12px; margin-top: 8px; display: flex; flex-direction: column; gap: 10px; }
    .aftersale-row-picks { display: flex; align-items: center; gap: 12px; width: 100%; border-bottom: 1px dashed #faebd7; padding-bottom: 8px; }
    .aftersale-options { display: flex; gap: 14px; margin-top: 2px; }
    .aftersale-options label { display: flex; align-items: center; gap: 4px; font-weight: 600; cursor: pointer; font-size: 13px; }
    .store-top-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .btn-gate-half { color: #fff; padding: 12px 4px; border-radius: 10px; font-size: 13px; font-weight: 700; text-align: center; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 4px 10px rgba(74,21,75,0.12); }
    .btn-gate-stock { background: linear-gradient(135deg, var(--primary), #6b266c); }
    .btn-gate-report { background: linear-gradient(135deg, #1890ff, #0050b3); }
    .btn-gate-newstore { background: linear-gradient(135deg, #ff9c6e, #ff4d4f); }
    .btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; margin-bottom:15px; text-align:center; border:none; }
    .smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .date-picker-wrapper { position: relative; display: inline-block; }
    .real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
    .search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }
    .search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
    .search-clear-btn:active { background: #d0c9d2; }
    .btn-aftersale-trigger { background: #fff; color: #e6a23c; border: 1px solid #f5dab1; font-weight: bold; font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 4px; }
    .btn-aftersale-trigger.active { background: #fdf6ec; border-color: #e6a23c; }
    .brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }
    .brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }
    .brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
    .spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }
    .spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500; }
    .spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }
    .brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }
    .sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }
    .hide { display:none !important; }
    .history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
    .stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
    .stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
    .stock-dir-select { padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }
    .alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }
    .amount-summary-banner { background: #fdfdfd; border: 1px solid #ebdfee; border-left: 5px solid var(--primary); padding: 10px 12px; border-radius: 6px; margin: 10px 0; font-size: 14px; color: #2b1d2c; }
    .amount-summary-banner strong { font-size: 15px; }
    .detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .detail-grid-item { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<div class="card">
  <div id="searchBlock" class="search-wrapper">
    <input id="search" placeholder="🔍 输入姓名或工号搜索员工..." oninput="handleSearch()" />
    <div id="clearSearch" class="search-clear-btn" onclick="clearSearchInput()">✕</div>
  </div>

  <div class="top-action-bar">
    <div id="back" class="back-btn hide" onclick="goBack()">返回</div>
    <div id="editStateBadge" class="editing-badge hide">正在修改历史单据</div>
  </div>

  <div id="list"></div>
  <div id="alphabetSidebar" class="alphabet-sidebar hide"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>
<script>
const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP"; 
let employees = [];
let stores = []; 
let products = [];
let currentEmployee = null;
let currentStore = null; 
let orderData = null; 
let currentSelectedBrand = null; 
let currentSelectedSpec = "ALL"; 
let historyOrders = []; 
let stockData = {}; 
let selectedReportDate = ""; 
let isNewStoreFlow = false; 

function isSpecialSpecOreo(productObj) {
  if (!productObj || !productObj.spec) return false;
  return productObj.spec.includes("3片装");
}

function formatQtyToUnits(totalPcs, specCase, specBox) {
  let displayCases = Math.floor(totalPcs / specCase);
  let remPcs = totalPcs % specCase;
  
  if (specBox > 0) {
    let displayBoxes = Math.floor(remPcs / specBox);
    let displayPcs = remPcs % specBox;
    return `${displayCases}件 ${displayBoxes}盒 ${displayPcs}个`;
  } else {
    return `${displayCases}件 ${remPcs}个`;
  }
}

function getPriceDecimalPlaces(prodId) {
  const idNum = Number(prodId);
  return (idNum >= 49 && idNum <= 55) ? 2 : 1;
}

function getLiveRowAmounts(productObj, qty, livePrice, giftQty, returnQty, returnHandle) {
  let saleAmount = 0; 
  let giftAmount = 0; 
  let restoreAmount = 0; 
  let scrapAmount = 0;    

  const isOreo = isSpecialSpecOreo(productObj);
  const defaultPrice = isOreo ? 17.5 : (productObj.default_price || 15);
  const specBox = isOreo ? (productObj.pcs_per_box || 6) : (productObj.pcs_per_box || 0);

  if (isOreo) {
    saleAmount = qty * livePrice;
    const liveSingleBagPrice = livePrice / (specBox || 6);
    const defaultSingleBagPrice = defaultPrice / (specBox || 6);
    giftAmount = giftQty * defaultSingleBagPrice; 
    if (returnHandle === 'SCRAP') {
      scrapAmount = returnQty * liveSingleBagPrice; 
    } else {
      restoreAmount = returnQty * liveSingleBagPrice; 
    }
  } else {
    saleAmount = qty * livePrice;
    giftAmount = giftQty * defaultPrice; 
    if (returnHandle === 'SCRAP') {
      scrapAmount = returnQty * livePrice;
    } else {
      restoreAmount = returnQty * livePrice;
    }
  }
  return { saleAmount, giftAmount, restoreAmount, scrapAmount };
}

function parseReturnHandleText(val) {
  if (!val || typeof val !== 'string' || !val.includes('_')) {
    return { qty: 0, handle: 'RESTORE' };
  }
  const parts = val.split('_');
  return { qty: parseInt(parts[0]) || 0, handle: parts[1] || 'RESTORE' };
}

async function init(){
  try {
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';
    
    // 【更新点】只从最新的 employees 表取数据
    const e = await client.from('employees').select('*');
    const p = await client.from('products').select('*');
    
    employees = e.data || [];
    products = (p.data || []).map(x => ({ 
      ...x, 
      spec: (x.spec || '常规款').trim(),
      pcs_per_box: parseInt(x.pcs_per_box) || 0 
    }));
    renderEmployees();
  } catch (err) {
    console.error(err);
    document.getElementById('list').innerHTML = '<div style="color:red;padding:10px;">❌ 页面初始化失败，请刷新重试</div>';
  }
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  if(val && val.length > 0) clearBtn.style.display = 'block';
  else clearBtn.style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function getSearch(){ return document.getElementById('search').value || ''; }

function renderEmployees(){
  STATE = 'EMP';
  orderData = null; 
  document.getElementById('back').classList.add('hide');
  document.getElementById('editStateBadge').classList.add('hide'); 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入姓名或工号搜索员工...";

  const k = getSearch();
  // 【更新点】对照最新结构，员工姓名字段改用 e.name，编码改用 e.employee_code
  const list = employees.filter(e => (e.name || '').includes(k) || (e.employee_code || '').includes(k));

  if (list.length === 0) {
    document.getElementById('list').innerHTML = `<div class="sub" style="text-align:center;padding:30px;">⚠️ 未找到匹配的员工</div>`;
    return;
  }

  document.getElementById('list').innerHTML = `
    <div class="emp-grid">
      ${list.map(e => `
        <div class='emp-card' onclick="openEmployee('${e.employee_code}','${e.name}')">
          <strong style="font-size:16px; color:var(--primary); display:block; margin-bottom:4px;">${e.name}</strong>
          <div class='sub' style="font-size:12px;">${e.employee_code}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function openEmployee(code, name){
  autoResetSearchState();
  STATE = 'STORE';
  orderData = null; 
  currentEmployee = {code, name};
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';

  // 【更新点】依照最新设计，直接通过专属关联表 employee_store_assets 提取该员工负责的门店资产列表，不管无关人员。
  const r = await client.from('employee_store_assets').select('atom_code, store_name').eq('employee_code', code);
  
  stores = (r.data || []).map(item => ({
    atom_code: String(item.atom_code).trim(),
    store_name: (item.store_name || '').trim()
  })).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
  
  renderStores();
}

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) { console.error(e); }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  orderData = null; 
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};
  const activeLetters = new Set();

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) { 
    sidebarEl.classList.remove('hide');
    sidebarEl.innerHTML = sortedLetters.map(l => `<div class="alphabet-letter" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('');
  } else {
    sidebarEl.classList.add('hide'); sidebarEl.innerHTML = '';
  }

  let listHtml = `
    <div class="store-top-gates">
      <button class="btn-gate-half btn-gate-stock" onclick="openStockManagement()">📦 库存管理</button>
      <button class="btn-gate-half btn-gate-report" onclick="openSaleReport()">📊 卖进数据</button>
      <button class="btn-gate-half btn-gate-newstore" onclick="openNewStoreManagement()">🆕 新门店</button>
    </div>
    <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 0 0 14px 4px;'>门店总数：${stores.length} 家</div>
    <div class="store-container">
  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到匹配的店铺</div>`;
  } else {
    sortedLetters.forEach(letter => {
      listHtml += `<div id="group_letter_${letter}" class="letter-group-title">${letter}</div>`;
      groupedStores[letter].forEach(s => {
        const isTemp = String(s.atom_code).startsWith('NEW_');
        listHtml += `
          <div class='item' onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">
            <div class="item-main-row">
              <div>
                <strong style="font-size:16px;color:var(--primary);">${s.store_name} ${isTemp ? '<span style="font-size:11px;background:#fff1f0;color:#ff4d4f;padding:2px 6px;border-radius:10px;">新门店</span>' : ''}</strong>
                <div class='sub'>${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }
  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openNewStoreManagement() {
  STATE = 'NEW_STORE_MGT';
  orderData = null;
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide');
  document.getElementById('searchBlock').classList.add('hide');

  const newStoresList = stores.filter(s => String(s.atom_code).startsWith('NEW_'));

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">🆕 新门店开单管理</div>
    <div class="sub" style="margin-bottom: 16px;">在此可以对尚未录入系统的临时新门店进行开单与管理。</div>
    
    <div style="margin: 14px 0;">
      <button class="btn-new-order" style="background:linear-gradient(135deg, #ff9c6e, #ff4d4f);" onclick="triggerCreateNewStore()">＋ 创建新门店并开单</button>
    </div>

    <div style='font-size:14px; font-weight:800; color:var(--primary); margin: 18px 0 8px 4px;'>已开单的新门店列表 (${newStoresList.length})</div>
    ${newStoresList.length === 0 ? `
      <div class="sub" style="text-align:center; padding:40px; color:#aaa; background:#faf9fa; border-radius:8px; border:1px dashed #e2dde3;">
        暂无自主创建的新门店信息
      </div>
    ` : newStoresList.map(s => `
      <div class="history-item" style="border-left: 4px solid #ff7875;">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong style="font-size:16px; color:var(--primary);">${s.store_name}</strong>
            <div class="sub" style="font-size:12px;">临时编码: ${s.atom_code}</div>
          </div>
          <button class="smallbtn" style="background:var(--primary); color:#fff; border:none; padding:6px 12px;" onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">去开单 / 历史 →</button>
        </div>
      </div>
    `).join('')}
  `;
}

function triggerCreateNewStore() {
  const storeName = prompt("请输入自定义新门店的名称:");
  if (!storeName || storeName.trim() === "") {
    if (storeName !== null) alert("门店名称不能为空！");
    return;
  }
  const randomSuffix = Math.random().toString(36).substring(2, 8).toUpperCase();
  const tempAtomCode = `NEW_${randomSuffix}`;
  isNewStoreFlow = true;
  currentStore = { atom: tempAtomCode, name: storeName.trim() };
  templateEditOrNew(null, null, null, tempAtomCode, storeName.trim());
}

async function openStockManagement(){
  STATE = 'STOCK';
  orderData = null;
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide');
  document.getElementById('alphabetSidebar').innerHTML = '';
  document.getElementById('searchBlock').classList.add('hide');
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载...</div>';

function generateFilterHeaderHtml() {
  const brands = [...new Set(products.map(p => p.brand))];

  return `
    <div class="brand-nav">

function updateStockActionType(barcode, val) {
  if (!stockData.additions[barcode]) {
    stockData.additions[barcode] = { type: 'ADD', cases: 0, boxes: 0, pcs: 0 };
  }
  stockData.additions[barcode].type = val;
}

function updateStockActionQty(barcode, unitType, val) {
  if (!stockData.additions[barcode]) {
    stockData.additions[barcode] = { type: 'ADD', cases: 0, boxes: 0, pcs: 0 };
  }
  const intV = parseInt(val) || 0;
  if(unitType === 'CASE') stockData.additions[barcode].cases = intV;
  else if(unitType === 'BOX') stockData.additions[barcode].boxes = intV;
  else if(unitType === 'PCS') stockData.additions[barcode].pcs = intV;
}

async function submitStockChanges(){
  const submitBtn = document.getElementById('submitStockBtn');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '正在提交...'; }

  try {
    const ops = [];
    for (const barcode in stockData.additions) {
      const item = stockData.additions[barcode];
      const p = products.find(x => x.barcode === barcode);
      if(!p) continue;
      
      const cSize = parseInt(p.pcs_per_case) || 1;
      const bSize = parseInt(p.pcs_per_box) || 0;
      const totalDelta = (item.cases || 0) * cSize + (item.boxes || 0) * bSize + (item.pcs || 0);
      
      if(totalDelta === 0) continue;
      
      const currentStock = stockData.currentStockMap[barcode] || 0;
      let newStockVal = currentStock;
      
      if(item.type === 'ADD') {
        newStockVal = currentStock + totalDelta;
      } else {
        newStockVal = currentStock - totalDelta;
        if(newStockVal < 0) newStockVal = 0; 
      }
      
      ops.push({
        employee_code: stockData.emp_code,
        product_barcode: barcode,
        qty: newStockVal,
        updated_at: new Date().toISOString()
      });
    }

    if(ops.length === 0) {
      alert("💡 您没有输入任何库存修改项！");
      if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 提交修改'; }
      return;
    }

    // 【更新点】针对新版 van_stocks 执行 upsert 覆盖写入
    for(const op of ops) {
      const { error } = await client.from('van_stocks').upsert(op, { onConflict: 'employee_code,product_barcode' });
      if(error) throw error;
    }

    alert("✨ 库存更新成功！");
    openStockManagement();
  } catch (err) {
    console.error(err);
    alert("❌ 库存数据更新失败，请检查网络重试！");
    if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 提交修改'; }
  }
}

function updateRowQty(barcode, unitType, val) {
  const p = products.find(x => x.barcode === barcode);
  if(!p) return;

  const specCase = parseInt(p.pcs_per_case) || 1;
  const specBox = p.pcs_per_box || 0;

  let currentCases = Math.floor(rowInput.qty / specCase);
  let remPcs = rowInput.qty % specCase;
  let currentBoxes = specBox > 0 ? Math.floor(remPcs / specBox) : 0;
  let currentPcs = specBox > 0 ? remPcs % specBox : remPcs;

  const intV = parseInt(val) || 0;
  if(unitType === 'CASE') currentCases = intV;
  else if(unitType === 'BOX') currentBoxes = intV;
  else if(unitType === 'PCS') currentPcs = intV;

  rowInput.qty = currentCases * specCase + currentBoxes * specBox + currentPcs;
  
  const bannerEl = document.querySelector('.amount-summary-banner strong');
  if(bannerEl) {
    let totalLiveOrderAmount = 0;
    products.forEach(prod => {
      const rIn = orderData.items[prod.barcode];
      if(rIn && rIn.qty > 0) {
        const rowAm = getLiveRowAmounts(prod, rIn.qty, rIn.livePrice, 0, 0, 'RESTORE');
        totalLiveOrderAmount += rowAm.saleAmount;
      }
    });
    bannerEl.innerText = `¥${totalLiveOrderAmount.toFixed(2)}`;
  }
}

function updateRowPrice(barcode, val) {
  const rowInput = orderData.items[barcode];
  if(rowInput) {
    rowInput.livePrice = parseFloat(val) || 0;
    
    const bannerEl = document.querySelector('.amount-summary-banner strong');
    if(bannerEl) {
      let totalLiveOrderAmount = 0;
      products.forEach(prod => {
        const rIn = orderData.items[prod.barcode];
        if(rIn && rIn.qty > 0) {
          const rowAm = getLiveRowAmounts(prod, rIn.qty, rIn.livePrice, 0, 0, 'RESTORE');
          totalLiveOrderAmount += rowAm.saleAmount;
        }
      });
      bannerEl.innerText = `¥${totalLiveOrderAmount.toFixed(2)}`;
    }
  }
}

async function submitOrderFinalSales(){
  const submitBtn = document.getElementById('submitOrderBtn');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '正在提交...'; }

  try {
    let finalTotalAmount = 0;
    const itemsToInsert = [];

    let hasValidItems = false;
    for (const barcode in orderData.items) {
      const rowInput = orderData.items[barcode];
      if(rowInput.qty > 0) {
        hasValidItems = true;
      }
    }

    if(!hasValidItems) {
      alert("💡 账单中没有任何有效的商品订购数量！");
      if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 提交账单'; }
      return;
    }

    const generatedOrderNo = orderData.order_no || 'SO-' + Date.now() + '-' + Math.floor(Math.random()*1000);

    for (const barcode in orderData.items) {
      const rowInput = orderData.items[barcode];
      if(rowInput.qty <= 0) continue;

      const p = products.find(x => x.barcode === barcode);
      if(!p) continue;

      const rowAm = getLiveRowAmounts(p, rowInput.qty, rowInput.livePrice, 0, 0, 'RESTORE');
      finalTotalAmount += rowAm.saleAmount;

      itemsToInsert.push({
        order_no: generatedOrderNo,
        barcode: barcode,
        product_name: p.name,
        qty: rowInput.qty,
        unit_price: rowInput.livePrice,
        amount: rowAm.saleAmount
      });
    }

    // 【更新点】针对 sales_orders 写入，全字段匹配最新结构
    const orderMasterRow = {
      order_no: generatedOrderNo,
      employee_code: currentEmployee.code,
      atom_code: orderData.atom,
      store_name: orderData.name,
      total_amount: finalTotalAmount,
      status: 'completed',
      remark: orderData.remark || null
    };

    if(orderData.id) {
      orderMasterRow.id = orderData.id;
    }

    const { data: savedOrder, error: orderErr } = await client
      .from('sales_orders')
      .upsert(orderMasterRow, { onConflict: 'id' })
      .select();

    if(orderErr) throw orderErr;

    if(orderData.id) {
      const { error: delErr } = await client.from('sales_order_items').delete().eq('order_no', generatedOrderNo);
      if(delErr) throw delErr;
    }

    const { error: itemsErr } = await client.from('sales_order_items').insert(itemsToInsert);
    if(itemsErr) throw itemsErr;

    // 【更新点】如果是新门店自主创建流程，联动在 employee_store_assets 表中注册此临时门店
    if (String(orderData.atom).startsWith('NEW_') && isNewStoreFlow) {
      const newStoreAssetRow = {
        employee_code: currentEmployee.code,
        atom_code: orderData.atom,
        store_name: orderData.name
      };
      await client.from('employee_store_assets').insert(newStoreAssetRow);
    }

    alert("✨ 恭喜，账单提交成功！");
    
    const isTemp = String(orderData.atom).startsWith('NEW_');
    const savedAtom = orderData.atom;
    const savedName = orderData.name;
    
    orderData = null;
    isNewStoreFlow = false;

    if(isTemp) {
      const r = await client.from('employee_store_assets').select('atom_code, store_name').eq('employee_code', currentEmployee.code);
      stores = (r.data || []).map(item => ({
        atom_code: String(item.atom_code).trim(),
        store_name: (item.store_name || '').trim()
      })).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
      
      openNewStoreManagement();
    } else {
      openStoreHistory(savedAtom, savedName);
    }

  } catch (err) {
    console.error(err);
    alert("❌ 账单提交失败，请重试！");
    if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 提交账单'; }
  }
}

function goBack(){
  document.getElementById('editStateBadge').classList.add('hide'); 
  if(STATE === 'STOCK' || STATE === 'REPORT' || STATE === 'NEW_STORE_MGT') {
    orderData = null;
    renderStores(); 
  }
  else if(STATE === 'DETAIL') {
    const isFromReport = document.getElementById('list').getAttribute('data-from-report') === 'true';
    if(isFromReport) {
      openSaleReport(selectedReportDate);
    } else {
      renderHistory();
    }
  }
  else if(STATE === 'ORDER') {
    if(orderData?.id) {
      const savedId = orderData.id;
      orderData = null; 
      renderHistory();
    } else {
      const isTemp = String(orderData?.atom).startsWith('NEW_');
      orderData = null;
      if (isTemp) {
        openNewStoreManagement();
      } else {
        renderHistory();
      }
    }
  }
  else if(STATE === 'HISTORY') {
    renderStores();
  }
  else if(STATE === 'STORE') {
    currentEmployee = null;
    renderEmployees();
  }
}

async function openSaleReport(targetDateStr="") {
  STATE = "REPORT";
  orderData = null;
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide');
  document.getElementById('searchBlock').classList.add('hide');
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在统计卖进报表数据...</div>';

  if(!targetDateStr) {
    const today = new Date();
    const offset = today.getTimezoneOffset() * 60000;
    const localISOTime = (new Date(today - offset)).toISOString().slice(0,10);
    targetDateStr = localISOTime;
  }
  selectedReportDate = targetDateStr;

  const startUtc = targetDateStr + "T00:00:00.000Z";
  const endUtc = targetDateStr + "T23:59:59.999Z";

  const { data: dayOrders } = await client.from('sales_orders')
    .select('*')
    .eq('employee_code', currentEmployee.code)
    .gte('created_at', startUtc)
    .lte('created_at', endUtc)
    .order('created_at', { ascending: false });

  historyOrders = dayOrders || [];

  let dayTotalSum = 0;
  historyOrders.forEach(o => dayTotalSum += (Number(o.total_amount) || 0));

  let html = `
    <div class="big-store-title" style="margin-bottom:2px;">📊 车销卖进日报</div>
    <div class="sub" style="margin-bottom:12px;">员工：<strong>${currentEmployee.name}</strong></div>
    
    <div style="background:#fff; border:1px solid #dcd6dd; border-radius:8px; padding:12px; margin-bottom:14px;">
      <div style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:6px;">切换报表查看日期:</div>
      <div class="date-picker-wrapper" style="width:100%;">
        <button class="smallbtn" style="width:100%; padding:10px; font-weight:bold; font-size:15px; color:var(--primary); background:#faf9fa; text-align:center;">📅 ${targetDateStr} (点击更改)</button>
        <input type="date" class="real-date-input" value="${targetDateStr}" onchange="openSaleReport(this.value)" />
      </div>
    </div>

    <div class="amount-summary-banner" style="background:#e8f5e9; border-left-color:#2e7d32; color:#1b5e20;">
      📈 该日卖进订单总数：<strong>${historyOrders.length} 单</strong><br/>
      💰 该日累计收款总额：<strong style="font-size:18px;">¥${dayTotalSum.toFixed(2)}</strong>
    </div>

    <div style='font-size:15px; font-weight:700; color:var(--primary); margin: 16px 0 8px 4px;'>本日已生成单据列表</div>
  `;

  if(historyOrders.length === 0) {
    html += `<div class="sub" style="text-align:center; padding:40px; color:#aaa; background:#faf9fa; border-radius:8px; border:1px dashed #e2dde3;">该日期下暂无任何账单</div>`;
  } else {
    historyOrders.forEach(o => {
      const timeStr = new Date(o.created_at).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit', timeZone: 'Asia/Shanghai'});
      html += `
        <div class="history-item" style="background:#fff;">
          <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
            <strong style="font-size:15px; color:var(--primary);">${o.store_name}</strong>
            <span style="font-size:12px; color:#756676;">⏰ ${timeStr}</span>
          </div>
          <div style="font-size:13px; color:var(--text-muted); margin: 2px 0;">单号: ${o.order_no}</div>
          <div style="font-size:14px; font-weight:700; color:#2e7d32;">实付金额: ¥${Number(o.total_amount).toFixed(2)}</div>
          <div style="margin-top: 6px; display:flex; gap:8px; width:100%; justify-content:flex-end;">
            <button class="smallbtn" onclick="viewOrderDetail('${o.id}', '${o.created_at}', true)">查看明细</button>
          </div>
        </div>
      `;
    });
  }

  document.getElementById('list').innerHTML = html;
}

// 启动页面初始化
init();
</script>
