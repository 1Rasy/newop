<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>随随车零售与车存账套</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --primary: #4A154B;        
      --primary-hover: #360f37; 
      --accent: #ffb81c;        
      --bg-main: #f4f2f5;       
      --text-main: #1f1121;     
      --text-muted: #756676;    
      --card-bg: #ffffff;       
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin:0; background: var(--bg-main); color: var(--text-main); padding-bottom: 90px; -webkit-tap-highlight-color: transparent; }
    .card { background: var(--card-bg); margin:12px; padding:16px; border-radius:12px; box-shadow: 0 4px 12px rgba(74,21,75,0.03); position: relative;}
    .top-action-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .back-btn { display: inline-flex; align-items: center; justify-content: center; background: #f4f2f5; color: var(--text-main); padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1px solid #e2dde3; transition: all 0.2s; }
    .back-btn:active { background: #e2dde3; transform: scale(0.97); }
    .back-btn::before { content: "←"; margin-right: 6px; font-weight: bold; font-size: 16px; }
    .editing-badge { font-size:12px; color:#e6a23c; background:#fff7eb; padding:6px 12px; border-radius:14px; font-weight:bold; border: 1px solid #f5dab1; }
    #list { width: 100%; }
    .big-store-title { font-size: 22px; font-weight: 800; color: #111827; margin: 4px 0 14px 0; letter-spacing: -0.5px; }
    .emp-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 0; }
    .emp-card { background: #faf9fa; border: 1px solid #eeeade; border-left: 4px solid var(--primary); border-radius: 8px; padding: 14px 12px; cursor: pointer; transition: all 0.15s ease; box-sizing: border-box; }
    .emp-card:active { background: #f3e2f5; transform: scale(0.97); }
    .store-container { padding-right: 24px; box-sizing: border-box; }
    .letter-group-title { background: #f4f2f5; color: var(--primary); font-weight: 700; font-size: 14px; padding: 4px 8px; margin: 12px 0 6px 0; border-radius: 4px; }
    .item { padding:14px 4px; border-bottom:1px solid #f4f2f5; box-sizing: border-box; width: 100%; }
    .item-main-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .prod-info { flex: 1; min-width: 0; }
    .prod-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .control-group { display: flex; align-items: center; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; max-width: 75%; }
    .picker-wrapper { display: inline-flex; align-items: center; gap: 3px; font-size: 13px; color: var(--text-muted); }
    .picker-wrapper span.label-txt { font-weight: 500; color: #665c67; }
    .picker-wrapper span.unit-txt { font-weight: 600; color: var(--text-main); font-size: 13px; }
    .ios-picker { background: #f4f2f5; color: var(--text-main); border: 1px solid #dcd6dd; border-radius: 6px; padding: 6px 6px; font-size: 14px; font-weight: 700; outline: none; cursor: pointer; -webkit-appearance: none; appearance: none; text-align: center; min-width: 40px; }
    .ios-picker:focus { border-color: var(--primary); background: #fff; }
    .store-top-gates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    .btn-gate-half { color: #fff; padding: 12px 4px; border-radius: 10px; font-size: 13px; font-weight: 700; text-align: center; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; box-shadow: 0 4px 10px rgba(74,21,75,0.12); }
    .btn-gate-stock { background: linear-gradient(135deg, var(--primary), #6b266c); }
    .btn-gate-report { background: linear-gradient(135deg, #1890ff, #0050b3); }
    .btn-gate-newstore { background: linear-gradient(135deg, #ff9c6e, #ff4d4f); }
    .btn-new-order { background: var(--primary); color:#fff; padding:12px; width:100%; border-radius:8px; font-size: 16px; font-weight:600; margin-bottom:15px; text-align:center; border:none; }
    .smallbtn { background:#f4f2f5; color:var(--text-main); border: 1px solid #e2dde3; padding:5px 10px; border-radius:6px; font-size: 13px; font-weight: 500; cursor: pointer; }
    .date-picker-wrapper { position: relative; display: inline-block; }
    .real-date-input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .search-wrapper { position: relative; margin: 4px 0 12px 0; width: 100%; box-sizing: border-box; }
    .search-wrapper input { width:100%; padding:12px 40px 12px 12px; margin:0; border: 1px solid #dcd6dd; border-radius: 8px; box-sizing:border-box; font-size:16px; background: #faf9fa; }
    .search-wrapper input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .search-clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; background: #e2dde3; color: #756676; border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; display: none; z-index: 5; }
    .brand-nav { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 6px 0; }
    .brand-badge { background: #f4f2f5; color: var(--text-muted); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-weight: 600; border: 1px solid transparent; }
    .brand-badge.active { background: #fbf4fc; color: var(--primary); border: 1px solid #eecbf5; }
    .spec-nav { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 12px 0; padding: 6px 0; border-bottom: 1px dashed #e2dde3; }
    .spec-badge { background: #ffffff; color: #665c67; padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #e2dde3; font-weight: 500; }
    .spec-badge.active { background: var(--primary); color: #ffffff; border-color: var(--primary); }
    .brand { font-weight:700; margin-top:10px; padding: 2px 0; color: var(--primary); font-size: 15px; display: flex; align-items: center; gap: 4px; }
    .sub { font-size:13px; color: var(--text-muted); margin-top: 2px; }

    .history-item { background: #faf9fa; padding:14px 16px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #eeeade; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .float-submit { position: fixed; right: 20px; bottom: 24px; z-index: 99; background: var(--primary); color: #fff; border: none; padding: 14px 26px; border-radius: 50px; font-size: 16px; font-weight: 700; box-shadow: 0 8px 16px rgba(74,21,75,0.3); }
    .stock-row { display: flex; flex-direction: column; width: 100%; background: #faf9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 10px; box-sizing: border-box; }
    .stock-input-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; align-items: center; }
    .stock-dir-select { padding: 5px 8px; background: #fff; border: 1px solid var(--primary); color: var(--primary); border-radius: 6px; font-size: 13px; font-weight: bold; outline: none; cursor: pointer; }
    .alphabet-sidebar { position: fixed; right: 16px; top: 140px; bottom: 100px; width: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 90; background: rgba(255, 255, 255, 0.85); border-radius: 12px; box-shadow: 0 2px 8px rgba(74,21,75,0.08); border: 1px solid #eeeade; user-select: none; -webkit-user-select: none; }

    .amount-summary-banner strong { font-size: 15px; }
    .detail-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; margin-top: 4px; font-size: 13px; color: var(--text-muted); line-height: 1.4; }
    .detail-grid-item { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<div class="card">

<script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.3/dist/index.js"></script>
<script>
const SUPABASE_URL = "https://mnmzqmqxdzagpounvchn.supabase.co";
const SUPABASE_KEY = "sb_publishable_-AQkn3K06H0cykzBsM_pGg_J1lYgIPF";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let STATE = "EMP"; 
let employees = [];
let stores = []; 
let products = [];
let currentEmployee = null;
let currentStore = null; 
let orderData = null; 
let currentSelectedBrand = null; 
let currentSelectedSpec = "ALL"; 
let historyOrders = []; 
let stockData = {}; 
let selectedReportDate = ""; 
let isNewStoreFlow = false; 

function isSpecialSpecOreo(productObj) {
  if (!productObj || !productObj.spec) return false;
  return productObj.spec.includes("3片装");
}

function formatQtyToUnits(totalPcs, specCase, specBox) {
  let displayCases = Math.floor(totalPcs / specCase);
  let remPcs = totalPcs % specCase;
  
  if (specBox > 0) {
    let displayBoxes = Math.floor(remPcs / specBox);
    let displayPcs = remPcs % specBox;
    return `${displayCases}件 ${displayBoxes}盒 ${displayPcs}个`;
  } else {
    return `${displayCases}件 ${remPcs}个`;
  }
}

async function init(){
  try {
    document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在载入系统资源...</div>';
    
    // 1. 获取白名单活跃员工
    const { data: empData } = await client.from('employees').select('*').eq('is_active', true);
    employees = empData || [];
    
    // 2. 加载有效商品数据字典
    const { data: prodData } = await client.from('products').select('*').eq('is_active', true);
    products = (prodData || []).map(x => ({ 
      ...x, 
      brand: (x.brand || '未知品牌').trim(),
      spec: (x.spec || '常规款').trim(),
      name: (x.name || '未命名商品').trim(),
      pcs_per_case: Number(x.pcs_per_case) || 24,
      pcs_per_box: Number(x.pcs_per_box) || 0 
    }));
    
    autoResetSearchState();
    renderEmployees();
  } catch (err) {
    console.error(err);
    document.getElementById('list').innerHTML = '<div style="color:red;padding:10px;">❌ 系统资源初始化失败，请检查网络或配置</div>';
  }
}

function handleSearch(){
  const val = document.getElementById('search').value;
  const clearBtn = document.getElementById('clearSearch');
  if(val && val.length > 0) clearBtn.style.display = 'block';
  else clearBtn.style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function autoResetSearchState() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
}

function clearSearchInput() {
  document.getElementById('search').value = '';
  document.getElementById('clearSearch').style.display = 'none';
  if(STATE === 'EMP') renderEmployees();
  else if(STATE === 'STORE') renderStores();
}

function getSearch(){ return (document.getElementById('search').value || '').trim(); }

function renderEmployees(){
  STATE = 'EMP';
  orderData = null; 
  document.getElementById('back').classList.add('hide');
  document.getElementById('editStateBadge').classList.add('hide'); 
  document.getElementById('alphabetSidebar').classList.add('hide'); 
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 搜索白名单中的员工姓名或工号...";

  const k = getSearch();
  const list = employees.filter(e=> (e.name||'').includes(k) || (e.employee_code||'').includes(k) );

  if (list.length === 0) {
    document.getElementById('list').innerHTML = `<div class="sub" style="text-align:center;padding:30px;">⚠️ 未找到匹配的活跃员工</div>`;
    return;
  }

  document.getElementById('list').innerHTML = `
    <div style="font-size:14px; font-weight:700; color:var(--primary); margin:4px 0 10px 4px;">👥 活跃员工白名单：</div>
    <div class="emp-grid">
      ${list.map(e=>`
        <div class='emp-card' onclick="openEmployee('${e.employee_code}','${e.name}')">
          <strong style="font-size:16px; color:var(--primary); display:block; margin-bottom:4px;">${e.name}</strong>
          <div class='sub' style="font-size:12px;">工号: ${e.employee_code}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function openEmployee(code, name){
  autoResetSearchState();
  STATE = 'STORE';
  orderData = null; 
  currentEmployee = {code, name};
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('list').innerHTML = '<div style="color:#756676;padding:10px;">正在加载分配绑定的门店...</div>';

  const { data: assetStores } = await client.from('employee_store_assets').select('*').eq('employee_code', code);
  
  stores = (assetStores || []).map(s => ({
    atom_code: s.atom_code,
    store_name: s.store_name
  })).sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
  
  renderStores();
}

function getStoreFirstLetter(storeName) {
  if (!storeName) return '#';
  try {
    const firstChar = storeName.trim().charAt(0);
    const pinyin = pinyinPro.pinyin(firstChar, { pattern: 'first', toneType: 'none' });
    if (pinyin && pinyin.length > 0) {
      const letter = pinyin.charAt(0).toUpperCase();
      if (/[A-Z]/.test(letter)) return letter;
    }
  } catch (e) { console.error(e); }
  return '#';
}

function renderStores(){
  STATE = 'STORE';
  orderData = null; 
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('searchBlock').classList.remove('hide'); 
  document.getElementById('search').placeholder = "🔍 输入门店名称或编码搜索店铺...";

  const k = getSearch();
  const f = stores.filter(s=> (s.store_name||'').includes(k) || (s.atom_code||'').includes(k) );

  const groupedStores = {};
  const activeLetters = new Set();

  f.forEach(s => {
    const letter = getStoreFirstLetter(s.store_name);
    if (!groupedStores[letter]) groupedStores[letter] = [];
    groupedStores[letter].push(s);
    activeLetters.add(letter);
  });

  const sortedLetters = Array.from(activeLetters).sort();
  const sidebarEl = document.getElementById('alphabetSidebar');
  
  if (sortedLetters.length > 1 && !k && f.length > 10) { 
    sidebarEl.classList.remove('hide');
    sidebarEl.innerHTML = sortedLetters.map(l => `<div class="alphabet-letter" onclick="scrollToLetterGroup('${l}')">${l}</div>`).join('');
  } else {
    sidebarEl.classList.add('hide'); sidebarEl.innerHTML = '';
  }

  let listHtml = `
    <div class="store-top-gates">
      <button class="btn-gate-half btn-gate-stock" onclick="openStockManagement()">📦 车销库存</button>
      <button class="btn-gate-half btn-gate-report" onclick="openSaleReport()">📊 卖进日报</button>
      <button class="btn-gate-half btn-gate-newstore" onclick="openNewStoreManagement()">🆕 临时门店</button>
    </div>
    <div style='font-size:14px; font-weight:700; color:var(--primary); margin: 0 0 14px 4px;'>负责门店总数：${stores.length} 家</div>
    <div class="store-container">
  `;

  if (sortedLetters.length === 0) {
    listHtml += `<div class="sub" style="text-align:center;padding:20px;">⚠️ 未找到绑定的门店</div>`;
  } else {
    sortedLetters.forEach(letter => {
      listHtml += `<div id="group_letter_${letter}" class="letter-group-title">${letter}</div>`;
      groupedStores[letter].forEach(s => {
        const isTemp = String(s.atom_code).startsWith('NEW_');
        listHtml += `
          <div class='item' onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">
            <div class="item-main-row">
              <div>
                <strong style="font-size:16px;color:var(--primary);">${s.store_name} ${isTemp ? '<span style="font-size:11px;background:#fff1f0;color:#ff4d4f;padding:2px 6px;border-radius:10px;">临时</span>' : ''}</strong>
                <div class='sub'>编码: ${s.atom_code}</div>
              </div>
            </div>
          </div>
        `;
      });
    });
  }
  listHtml += `</div>`;
  document.getElementById('list').innerHTML = listHtml;
}

function scrollToLetterGroup(letter) {
  const target = document.getElementById(`group_letter_${letter}`);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openNewStoreManagement() {
  STATE = 'NEW_STORE_MGT';
  orderData = null;
  document.getElementById('back').classList.remove('hide');
  document.getElementById('editStateBadge').classList.add('hide');
  document.getElementById('alphabetSidebar').classList.add('hide');
  document.getElementById('searchBlock').classList.add('hide');

  const newStoresList = stores.filter(s => String(s.atom_code).startsWith('NEW_'));

  document.getElementById('list').innerHTML = `
    <div class="big-store-title">🆕 临时门店开单</div>

    <div style="margin: 14px 0;">
      <button class="btn-new-order" style="background:linear-gradient(135deg, #ff9c6e, #ff4d4f);" onclick="triggerCreateNewStore()">＋ 自主新增临时门店</button>

    ${newStoresList.length === 0 ? `
      <div class="sub" style="text-align:center; padding:40px; color:#aaa; background:#faf9fa; border-radius:8px; border:1px dashed #e2dde3;">
        暂无临时门店开单记录
      </div>
    ` : newStoresList.map(s => `
      <div class="history-item" style="border-left: 4px solid #ff7875;">
        <div style="width:100%; display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong style="font-size:16px; color:var(--primary);">${s.store_name}</strong>
            <div class="sub" style="font-size:12px;">临时编码: ${s.atom_code}</div>
          </div>
          <button class="smallbtn" style="background:var(--primary); color:#fff; border:none; padding:6px 12px;" onclick="openStoreHistory('${s.atom_code}','${s.store_name}')">去开单 / 历史 →</button>

  const randomSuffix = Math.random().toString(36).substring(2, 8).toUpperCase();

  isNewStoreFlow = true; 
  currentStore = { atom: tempAtomCode, name: storeName.trim() };

}

async function openStockManagement(){
  STATE = 'STOCK';
  orderData = null;

  document.getElementById('alphabetSidebar').classList.add('hide');

  stockData = { emp_code: currentEmployee.code, currentStockMap: stockMap, additions: {} };

  if(!currentSelectedBrand) {
    const brands = [...new Set(products.map(p => p.brand))];

function generateFilterHeaderHtml() {
  const brands = [...new Set(products.map(p => p.brand))];
  if (!currentSelectedBrand && brands.length > 0) currentSelectedBrand = brands[0];
  
  const availableSpecs = [...new Set(products.filter(p => p.brand === currentSelectedBrand).map(p => p.spec))];
  if (currentSelectedSpec !== "ALL" && !availableSpecs.includes(currentSelectedSpec)) {
    currentSelectedSpec = "ALL";
  }

  return `
    <div class='brand-nav'>
      ${brands.map(b => `<div class="brand-badge ${b === currentSelectedBrand ? 'active' : ''}" onclick="selectBrand('${b}')">${b}</div>`).join('')}
    </div>
    <div class='spec-nav'>
      <div class="spec-badge ${currentSelectedSpec === 'ALL' ? 'active' : ''}" onclick="selectSpec('ALL')">全部规格</div>
      ${availableSpecs.map(sp => `<div class="spec-badge ${currentSelectedSpec === sp ? 'active' : ''}" onclick="selectSpec('${sp}')">${sp}</div>`).join('')}
    </div>
    <div class='brand'>📂 筛选：${currentSelectedBrand || '无'} ➔ ${currentSelectedSpec === 'ALL' ? '全部规格' : currentSelectedSpec}</div>
  `;
}

function selectBrand(brandName) { currentSelectedBrand = brandName; currentSelectedSpec = "ALL"; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }
function selectSpec(specName) { currentSelectedSpec = specName; if(STATE === 'ORDER') renderOrder(); else if(STATE === 'STOCK') renderStockPage(); }

function makePureQtyOptionsHtml(max, current) {
  let html = '';
  for(let i=0; i<=max; i++) {
    html += `<option value="${i}" ${i === current ? 'selected' : ''}>${i}</option>`;
  }
  return html;
}

function makePurePriceOptionsHtml(centerPrice, stepPlaces, currentSelected) {
  let html = '';
  let start = Math.max(0.1, centerPrice - 15);
  let end = centerPrice + 30;
  let step = 0.1; 
  for (let p = start; p <= end; p += step) {
    let val = +p.toFixed(stepPlaces);
    html += `<option value="${val}" ${Math.abs(val - currentSelected) < 0.005 ? 'selected' : ''}>${val.toFixed(stepPlaces)}</option>`;
  }
  return html;
}

function updateStockInput(barcode, type, val){
  if(!stockData.additions[barcode]) stockData.additions[barcode] = { dir: 'plus', cases: 0, boxes: 0, pcs: 0 };
  if(type === 'dir') stockData.additions[barcode].dir = val;
  else stockData.additions[barcode][type] = parseInt(val) || 0;
}

async function submitStock(){
  const addBarcodes = Object.keys(stockData.additions);
  let hasData = false; const updates = []; 

  for(let bc of addBarcodes){
    const p = products.find(x => String(x.barcode) === String(bc));
    if(!p) continue;
    const specCase = p.pcs_per_case || 24; 
    const specBox = p.pcs_per_box || 0;
    
    const dir = stockData.additions[bc].dir || 'plus';
    const addedCases = stockData.additions[bc].cases || 0;
    const addedBoxes = stockData.additions[bc].boxes || 0;
    const addedPcs = stockData.additions[bc].pcs || 0;

    let delta = specBox > 0 ? (addedCases * specCase) + (addedBoxes * specBox) + addedPcs : (addedCases * specCase) + addedPcs;
    if(delta > 0){
      hasData = true; const currentTotal = stockData.currentStockMap[bc] || 0;
      let newTotal = dir === 'plus' ? currentTotal + delta : currentTotal - delta;
      if (newTotal < 0) { alert(`❌ [${p.name}] 微调后车存不能为负数！`); return; }
      updates.push({ employee_code: stockData.emp_code, product_barcode: bc, qty: newTotal, updated_at: new Date().toISOString() });
    }
  }
  if(!hasData){ alert("请先选择方向并选择需要手动调整的数量！"); return; }
  
  await client.from('van_stocks').upsert(updates, { onConflict: 'employee_code,product_barcode' });
  openStockManagement();
}

async function deleteExistingOrder(orderNo, rawItemsEncoded) {
  if (!confirm("⚠️ 作废订单将自动原路返回退回员工的车销 van_stocks 可用库存！确定删除吗？")) return;

  const listEl = document.getElementById('list');
  const isFromReport = listEl.getAttribute('data-from-report') === 'true';
  listEl.innerHTML = '<div style="color:#756676;padding:10px;">正在作废并回滚车存...</div>';

  try {
    const items = JSON.parse(decodeURIComponent(rawItemsEncoded));

    const { data: currentStocks } = await client.from('van_stocks').select('*').eq('employee_code', currentEmployee.code);
    const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_barcode] = Number(st.qty) || 0; });

    const stockUpdates = [];
    items.forEach(it => {
      const bc = it.barcode;
      const oldSoldQty = Number(it.qty || 0);
      const restoredStock = Number(liveStockMap[bc] || 0) + oldSoldQty;
      
      stockUpdates.push({
        employee_code: currentEmployee.code,
        product_barcode: bc,
        qty: restoredStock,
        updated_at: new Date().toISOString()
      });
    });

    await client.from('sales_order_items').delete().eq('order_no', orderNo);
    await client.from('sales_orders').delete().eq('order_no', orderNo);

    if (stockUpdates.length > 0) {
      await client.from('van_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_barcode' });
    }

    if (isFromReport) openSaleReport(selectedReportDate);
    else openStoreHistory(currentStore.atom, currentStore.name);
  } catch (err) {
    console.error(err);
    alert("❌ 作废失败：" + err.message);
    openStoreHistory(currentStore.atom, currentStore.name);
  }
}

function initItemState(barcode) {
  if(!orderData.items[barcode]){ 
    const p = products.find(x => String(x.barcode) === String(barcode)); 
    if(!p) return;
    orderData.items[barcode] = { qty: 0, price: (p.default_price || 15) }; 
  }
}

function pickerChangeQty(barcode, value) { initItemState(barcode); if(orderData.items[barcode]) orderData.items[barcode].qty = parseInt(value) || 0; calculateLiveOrderAmounts(); }

function pickerChangePrice(barcode, value) { 
  initItemState(barcode); 
  const targetPrice = parseFloat(value) || 0;
  const currentProd = products.find(x => String(x.barcode) === String(barcode));
  if (!currentProd) return;

  const sameSpecProducts = products.filter(p => p.brand === currentProd.brand && p.spec === currentProd.spec);
  sameSpecProducts.forEach(p => {
    initItemState(p.barcode);
    if(orderData.items[p.barcode]) orderData.items[p.barcode].price = targetPrice;
  });
  renderOrder();
}

async function submitOrder(){
  let grandTotalQty = 0;
  Object.keys(orderData.items).forEach(bc => { grandTotalQty += Number(orderData.items[bc].qty || 0); });

  if (grandTotalQty === 0) { alert("⚠️ 订单中没有任何出货数量，无法提单！"); return; }

  const submitBtn = document.querySelector('.float-submit');
  if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = '⏳ 正在提交减扣车存...'; }

  try {
    if (isNewStoreFlow) {
      await client.from('employee_store_assets').insert({
        employee_code: currentEmployee.code,
        atom_code: orderData.atom,
        store_name: orderData.name
      });
      stores.push({ atom_code: orderData.atom, store_name: orderData.name });
      stores.sort((a, b) => (a.store_name || '').localeCompare((b.store_name || ''), 'zh-CN'));
      isNewStoreFlow = false; 
    }

    const { data: currentStocks } = await client.from('van_stocks').select('*').eq('employee_code', currentEmployee.code);
    const liveStockMap = {}; (currentStocks || []).forEach(st => { liveStockMap[st.product_barcode] = Number(st.qty) || 0; });

    const stockUpdates = []; 
    let isStockDeficit = false; 
    let totalOrderAmount = 0;
    const formattedItems = [];

    for (let bc of Object.keys(orderData.items)) {
      const item = orderData.items[bc];
      if (!item || Number(item.qty || 0) <= 0) continue;
      
      const pObj = products.find(x => String(x.barcode) === String(bc));
      if(!pObj) continue;

      const soldQty = Number(item.qty || 0);
      const rowPrice = Number(item.price || 0);
      const rowAmount = soldQty * rowPrice;
      totalOrderAmount += rowAmount;

      const finalNewStock = Number(liveStockMap[bc] || 0) - soldQty;
      if (finalNewStock < 0) isStockDeficit = true;

      stockUpdates.push({ 
        employee_code: currentEmployee.code, 
        product_barcode: bc, 
        qty: finalNewStock,
        updated_at: new Date().toISOString()
      });

      formattedItems.push({
        order_no: orderData.order_no,
        barcode: bc,
        product_name: pObj.name,
        qty: soldQty,
        unit_price: rowPrice,
        amount: rowAmount
      });
    }

    await client.from('sales_orders').insert({
      order_no: orderData.order_no,
      employee_code: currentEmployee.code,
      atom_code: orderData.atom,
      store_name: orderData.name,
      total_amount: totalOrderAmount,
      status: 'completed'
    });

    await client.from('sales_order_items').insert(formattedItems);

    if (stockUpdates.length > 0) {
      await client.from('van_stocks').upsert(stockUpdates, { onConflict: 'employee_code,product_barcode' });
    }

    if (isStockDeficit) alert('⚠️ 零售提单成功！部分货品扣成了负数，请注意及时补货！');
    else alert('🎉 零售开单成功，车内存量已自动核减！');
    
    orderData = null; 
    openStoreHistory(currentStore.atom, currentStore.name);

  } catch (err) {
    console.error(err);
    alert("❌ 开单失败：" + err.message);
    if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = '🚀 重新收款提单'; }
  }
}

  else if(STATE === 'ORDER') {
    const isTemp = String(orderData?.atom).startsWith('NEW_');
    orderData = null;
    if (isTemp) openNewStoreManagement();
    else renderHistory();
  }
  else if(STATE === 'HISTORY') {
    const isTemp = String(currentStore?.atom).startsWith('NEW_');
    orderData = null;
    if (isTemp) openNewStoreManagement();
    else renderStores(); 
  }
  else if(STATE === 'STORE') { orderData = null; renderEmployees(); }
}

init();
</script>
</body>
</html>
