<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>经销商出库单导入系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #4A154B; --bg-main: #f4f2f5; --text-main: #1f1121; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg-main); color: var(--text-main); }
    .container { max-width: 600px; margin: 40px auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(74,21,75,0.05); text-align: center; }
    h2 { margin-top: 0; color: var(--primary); font-size: 22px; font-weight: 800; }
    .p-tip { color: #756676; font-size: 14px; margin-bottom: 24px; }
    
    .upload-box { 
      border: 2px dashed #ebdfee; 
      background: #faf9fb; 
      padding: 50px 20px; 
      border-radius: 12px; 
      cursor: pointer; 
      transition: all 0.2s ease-in-out; 
      position: relative; 
    }
    .upload-box.dragover { 
      border-color: #10b981 !important; 
      background: #f0fdf4 !important; 
    }
    .upload-box:hover { border-color: var(--primary); background: #fbf4fc; }
    .upload-icon { font-size: 44px; margin-bottom: 12px; pointer-events: none; }
    
    .file-input { 
      position: absolute; 
      top: 0; left: 0; width: 100%; height: 100%; 
      opacity: 0; cursor: pointer; 
    }
    
    .file-info { margin-top: 20px; padding: 12px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 14px; font-weight: bold; color: #047857; display: none; }
    .btn-submit { margin-top: 24px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(74,21,75,0.15); transition: opacity 0.2s; }
    .btn-submit:disabled { background: #dcd6dd; cursor: not-allowed; box-shadow: none; }
    .status-msg { margin-top: 15px; font-size: 14px; font-weight: 600; color: var(--primary); }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📊 经销商出库单导入</h2>
    <p class="p-tip">请直接选择或拖拽经销商导出的原始 Excel 表格到下方方块中。</p>
    
    <div class="upload-box" id="dropZone">
      <div class="upload-icon">📁</div>
      <div style="font-weight: 600; font-size: 15px; pointer-events: none;">点击区域选择文件，或将原始 Excel 拖到这里</div>
      <div style="font-size: 12px; color: #a195a2; margin-top: 5px; pointer-events: none;">支持 .xlsx, .xls 格式</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="fileInfo" class="file-info">📌 已成功锁定文件: <span id="fileName"></span></div>
    
    <button id="submitBtn" class="btn-submit" disabled onclick="startImport()">🚀 确认一键导入数据库</button>
    <div id="statusMsg" class="status-msg hide"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ===================================================
  // 🔗 请在下方双引号中填入你项目真实的 Supabase 密钥
  // ===================================================
  const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG"; 

  // 🛡️ 实例初始化
  window.mySupabaseInstance = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  // 安全清洗后的映射字典（移除了折扣列里可能引发编码崩溃的括号字符）
  const SAFE_FIELD_TRANSLATOR = {
    "单号": "order_no", "单据编号": "doc_no", "制单日期": "bill_date",
    "客户编号": "customer_code", "客户": "customer_name", "商品编号": "sku_code",
    "条形码": "barcode", "商品名称": "product_name", "包装": "package_reg",
    "件": "qty_piece", "1": "amount_piece", "散": "qty_scatter",
    "2": "unit", "3": "unit_price", "折扣": "discount", "应收款": "total_amount"
  };

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  let selectedFile = null;

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
  });
  function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

  ['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
  });
  ['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
  });

  dropZone.addEventListener('drop', function(e) {
    const dt = e.dataTransfer;
    if (dt.files.length > 0) handleFileSelection(dt.files[0]);
  });

  fileInput.addEventListener('change', function(e) {
    if (e.target.files.length > 0) handleFileSelection(e.target.files[0]);
  });

  function handleFileSelection(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'xlsx' && ext !== 'xls') {
      alert("⚠️ 格式错误！请务必上传经销商原始 Excel 表格文件（.xlsx 或 .xls）");
      return;
    }
    selectedFile = file;
    fileName.innerText = file.name;
    fileInfo.style.display = 'block'; 
    submitBtn.disabled = false;      
    statusMsg.classList.add('hide');
  }

  function startImport() {
    if (!selectedFile) return;
    if (!window.mySupabaseInstance) {
      alert("⚠️ 检测到你尚未在代码第 71-72 行填写真实的 Supabase URL 和 KEY，请填写后再提交！");
      submitBtn.disabled = false;
      return;
    }
    
    submitBtn.disabled = true;
    statusMsg.classList.remove('hide');
    statusMsg.innerText = "⏳ 正在解析原始 Excel 文档...";

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const rawRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        
        if (rawRows.length === 0) throw new Error("Excel 内部没有检测到任何有效行！");

        statusMsg.innerText = `⚙️ 安全清洗程序正在过滤字符并转换表头 (${rawRows.length}行)...`;

        const batchId = "BATCH_" + Date.now();
        const safePayloads = rawRows.map(row => {
          let newRow = { import_batch_id: batchId, is_processed: false };
          for (let chineseKey in row) {
            // 🛡️ 核心修复：强行剔除表头里的空格、特殊符号以及各种中英文括号，确保安全
            let cleanKey = chineseKey.replace(/[\s\(\)\（\）\%]/g, "");
            
            const englishKey = SAFE_FIELD_TRANSLATOR[cleanKey];
            if (englishKey) {
              newRow[englishKey] = row[chineseKey];
            }
          }
          return newRow;
        });

        statusMsg.innerText = `🚀 正在全速录入 Supabase 数据库...`;

        const { error } = await window.mySupabaseInstance.from('raw_dealer_outbounds').insert(safePayloads);
        if (error) throw error;

        statusMsg.innerText = `✅ 成功导入数据库！`;
        alert(`🎉 成功！已顺利通过中间安全映射程序导入 ${safePayloads.length} 条原始记录！`);
        
        fileInfo.style.display = 'none';
        selectedFile = null;
      } catch (err) {
        console.error(err);
        statusMsg.innerText = `❌ 导入失败`;
        alert(`导入出错，原因: ${err.message || '请检查表头或 Supabase 配置。'}`);
        submitBtn.disabled = false;
      }
    };
    reader.readAsArrayBuffer(selectedFile);
  }
</script>
</body>
</html>
