<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>经销商出库单导入系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #4A154B; --bg-main: #f8f9fa; --text-main: #212529; --card-bg: #ffffff; --border-color: #dee2e6; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 40px 20px; background: var(--bg-main); color: var(--text-main); }
    .container { max-width: 650px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    h2 { margin-top: 0; margin-bottom: 20px; color: var(--text-main); font-size: 20px; font-weight: 600; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    
    .upload-box { 
      border: 1px dashed var(--border-color); 
      background: #ffffff; 
      padding: 40px 20px; 
      border-radius: 6px; 
      cursor: pointer; 
      text-align: center;
      transition: all 0.15s ease-in-out; 
      position: relative; 
    }
    .upload-box.dragover { 
      border-color: var(--primary) !important; 
      background: #fdfafd !important; 
    }
    .upload-box:hover { border-color: var(--primary); }
    
    .file-input { 
      position: absolute; 
      top: 0; left: 0; width: 100%; height: 100%; 
      opacity: 0; cursor: pointer; 
    }
    
    .file-info { margin-top: 20px; padding: 12px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 4px; font-size: 14px; color: #2e7d32; display: none; }
    .btn-submit { margin-top: 20px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-submit:hover { background: #360f37; }
    .btn-submit:disabled { background: #ced4da; cursor: not-allowed; }
    .status-msg { margin-top: 15px; font-size: 14px; font-weight: 600; color: var(--primary); text-align: center; }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>经销商出库单数据导入</h2>
    
    <div class="upload-box" id="dropZone">
      <div id="uploadPrompt" style="font-size: 14px; color: #495057;">点击选择文件，或将原始 Excel 文件拖拽至此处</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="fileInfo" class="file-info">已选择文件: <span id="fileName"></span></div>
    
    <button id="submitBtn" class="btn-submit" disabled onclick="startImport()">确认导入数据库</button>
    <div id="statusMsg" class="status-msg hide"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG"; 

  window.mySupabaseInstance = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  // ====================================================================
  // ⚡ 核心修复：针对你发出的精确表头，进行严格对齐与清洗。
  // ====================================================================
  const SAFE_FIELD_TRANSLATOR = {
    "单号": "order_no",
    "单据编号": "doc_no",
    "制单日期": "bill_date",
    "客户编号": "customer_code",
    "客户": "customer_name",
    "商品编号": "sku_code",
    "条形码": "barcode",
    "商品名称": "product_name",
    "包装": "package_reg",
    "件": "qty_piece",
    "1": "amount_piece",     // 件的总价
    "散": "qty_scatter",     // 散货数量
    "2": "unit",             // 二级规格名称（如：盒、包）
    "3": "amount_scatter",  // 散件的总价
    "折扣": "discount",       // 模糊匹配包含“折扣”即可
    "应收款": "total_amount"
  };

  const NUMERIC_FIELDS = [
    "package_reg", "qty_piece", "amount_piece", "qty_scatter", 
    "amount_scatter", "discount", "total_amount"
  ];

  // ====================================================================
  // 🎯 特殊商品配置：请在此处填入那个直接记录第三级散数的特殊商品的条形码
  // ====================================================================
  const SPECIAL_PRODUCT_BARCODE = "请在此处填入该特殊商品的真实条形码"; 

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  let selectedFile = null;

  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
  });
  function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

  ['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
  });
  ['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
  });

  dropZone.addEventListener('drop', function(e) {
    const dt = e.dataTransfer;
    if (dt.files.length > 0) handleFileSelection(dt.files[0]);
  });

  fileInput.addEventListener('change', function(e) {
    if (e.target.files.length > 0) handleFileSelection(e.target.files[0]);
  });

  function handleFileSelection(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext !== 'xlsx' && ext !== 'xls') {
      alert("文件格式错误，请重新选择 .xlsx 或 .xls 格式的 Excel 表格。");
      return;
    }
    selectedFile = file;
    fileName.innerText = file.name;
    fileInfo.style.display = 'block'; 
    submitBtn.disabled = false;      
    statusMsg.classList.add('hide');
  }

  function startImport() {
    if (!selectedFile) return;
    if (!window.mySupabaseInstance) {
      alert("错误：未配置有效的 Supabase URL 或 KEY。");
      submitBtn.disabled = false;
      return;
    }
    
    submitBtn.disabled = true;
    statusMsg.classList.remove('hide');
    statusMsg.innerText = "正在解析 Excel 文档...";

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        
        const rawRows = XLSX.utils.sheet_to_json(worksheet, {
          raw: false,
          dateNF: 'yyyy-mm-dd hh:mm:ss'
        });
        
        if (rawRows.length === 0) throw new Error("Excel 未包含有效数据行。");

        statusMsg.innerText = "正在执行高级数据标准化清洗...";

        const batchId = "BATCH_" + Date.now();
        
        // 提取系统现有的商品表，用以在后端辅助识别特殊商品
        const { data: dbProducts } = await window.mySupabaseInstance.from('products').select('*');
        const productsList = dbProducts || [];

        const safePayloads = rawRows.map((row, index) => {
          let newRow = { import_batch_id: batchId, is_processed: false };
          
          // 深度清洗并匹配表头
          for (let originalKey in row) {
            // 去除首尾空格、中间空格、换行、制表符
            let cleanKey = originalKey.replace(/[\s\r\n\t]/g, "");
            
            // 针对带有括号的特殊列（如 折扣(%)）进行平滑模糊匹配
            if (cleanKey.includes("折扣")) {
              cleanKey = "折扣";
            }

            const englishKey = SAFE_FIELD_TRANSLATOR[cleanKey];
            if (englishKey) {
              let val = row[originalKey];
              if (NUMERIC_FIELDS.includes(englishKey)) {
                if (val === "" || val === undefined || val === null || String(val).trim() === "") {
                  newRow[englishKey] = 0;
                } else {
                  newRow[englishKey] = Number(val);
                }
              } else {
                newRow[englishKey] = (val !== undefined && val !== null) ? String(val).trim() : val;
              }
            }
          }
          
          // 强制查缺补漏，确保数值字段不为 undefined
          NUMERIC_FIELDS.forEach(numKey => {
            if (newRow[numKey] === undefined) newRow[numKey] = 0;
          });

          // ====================================================================
          // 🛑 核心业务特例拦截：针对特殊三级规格商品的清洗逻辑
          // ====================================================================
          if (newRow.barcode === SPECIAL_PRODUCT_BARCODE && SPECIAL_PRODUCT_BARCODE !== "") {
            // 该特殊商品在经销商 Excel 里的“散”直接就是最底层的数量，不需要进行任何“中盒转换”
            // 我们在入库前打上特殊标记，或者保持它的原始数值，后续分发逻辑看到此条码将直接划归入最小散数
            newRow.is_triple_spec_direct = true; 
          } else {
            newRow.is_triple_spec_direct = false;
          }

          return newRow;
        });

        // 彻底剔除单号为空的坏行，防止单号 null 锁死唯一索引
        const finalPayloads = safePayloads.filter(r => r.order_no && r.order_no !== "undefined" && r.order_no !== "null");
        
        if (finalPayloads.length === 0) {
          throw new Error("清洗后未发现有效单号，请检查 Excel 里的【单号】列字样是否完全吻合。");
        }

        statusMsg.innerText = `正在写入数据库... (有效行数: ${finalPayloads.length} 条)`;

        const { data: insertResult, error } = await window.mySupabaseInstance
          .from('raw_dealer_outbounds')
          .upsert(finalPayloads, { 
            onConflict: 'order_no',
            count: 'exact'
          });

        if (error) throw error;

        // 精准计算成功率
        const incomingOrderNos = finalPayloads.map(r => r.order_no);
        const { data: currentBatchRows, error: fetchError } = await window.mySupabaseInstance
          .from('raw_dealer_outbounds')
          .select('order_no')
          .in('order_no', incomingOrderNos)
          .eq('import_batch_id', batchId);

        let newInsertedCount = finalPayloads.length;
        let filteredCount = 0;

        if (!fetchError && currentBatchRows) {
          newInsertedCount = currentBatchRows.length;
          filteredCount = finalPayloads.length - newInsertedCount;
        }

        statusMsg.innerText = "数据导入完成。";
        
        if (filteredCount > 0) {
          alert(`数据导入成功。\n本次共处理 Excel 数据 ${finalPayloads.length} 条：\n- 成功导入新出库单: ${newInsertedCount} 条\n- 检测并自动过滤重复单号: ${filteredCount} 条`);
        } else {
          alert(`数据导入成功，共顺利导入 ${newInsertedCount} 条新数据。`);
        }
        
        fileInfo.style.display = 'none';
        selectedFile = null;
        submitBtn.disabled = true;
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "导入失败";
        alert(`导入终止，原因: ${err.message || '未知错误，请检查表头或字段。'}`);
        submitBtn.disabled = false;
      }
    };
    reader.readAsArrayBuffer(selectedFile);
  }
</script>
</body>
</html>
