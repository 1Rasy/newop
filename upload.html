<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>经销商出库单导入系统 - 强力对齐版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #4A154B; --bg-main: #f8f9fa; --text-main: #212529; --card-bg: #ffffff; --border-color: #dee2e6; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 40px 20px; background: var(--bg-main); color: var(--text-main); }
    .container { max-width: 650px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 8px; border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    h2 { margin-top: 0; margin-bottom: 20px; color: var(--text-main); font-size: 20px; font-weight: 600; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
    .upload-box { border: 1px dashed var(--border-color); background: #ffffff; padding: 40px 20px; border-radius: 6px; cursor: pointer; text-align: center; position: relative; }
    .upload-box.dragover { border-color: var(--primary) !important; background: #fdfafd !important; }
    .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .file-info { margin-top: 20px; padding: 12px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 4px; font-size: 14px; color: #2e7d32; display: none; }
    .btn-submit { margin-top: 20px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 4px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn-submit:disabled { background: #ced4da; cursor: not-allowed; }
    .status-msg { margin-top: 15px; font-size: 14px; font-weight: 600; color: var(--primary); text-align: center; }
    .hide { display: none !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>经销商出库单精准对齐导入</h2>
    
    <div class="upload-box" id="dropZone">
      <div id="uploadPrompt" style="font-size: 14px; color: #495057;">点击选择文件，或将原始 Excel 文件拖拽至此处</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="fileInfo" class="file-info">已选择文件: <span id="fileName"></span></div>
    
    <button id="submitBtn" class="btn-submit" disabled onclick="startImport()">确认导入数据库</button>
    <div id="statusMsg" class="status-msg hide"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG"; 
  window.mySupabaseInstance = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  // ====================================================================
  // 🎯 核心特例配置：多个规格错乱、跳过中盒直达底层的特殊商品白名单
  // ====================================================================
  const SPECIAL_PRODUCTS_MAP = {
    "6901234567890": { note: "特殊商品 A：跳过中盒，散等于最底层数量" },
    "6901111111111": { note: "特殊商品 B：直接记底层散数" },
    "6902222222222": { note: "特殊商品 C：三级规格直发" }
    // 💡 如果还有其他特殊条码，直接复制格式往下面加即可
  };

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  let selectedFile = null;

  // 拖拽事件监听
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, e => { e.preventDefault(); e.stopPropagation(); }));
  ['dragenter', 'dragover'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.add('dragover')));
  ['dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, () => dropZone.classList.remove('dragover')));
  dropZone.addEventListener('drop', e => { if (e.dataTransfer.files.length > 0) handleFileSelection(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if (e.target.files.length > 0) handleFileSelection(e.target.files[0]); });

  function handleFileSelection(file) {
    selectedFile = file;
    fileName.innerText = file.name;
    fileInfo.style.display = 'block'; 
    submitBtn.disabled = false;      
    statusMsg.classList.add('hide');
  }

  function startImport() {
    if (!selectedFile || !window.mySupabaseInstance) return;
    
    submitBtn.disabled = true;
    statusMsg.classList.remove('hide');
    statusMsg.innerText = "正在扫描 Excel 物理列分布...";

    const reader = new FileReader();
    reader.onload = async function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // 🛠️ 核心改变：抛弃按行转 JSON，直接转为纯二维矩阵（行与列的坐标数组）
        // 这样可以完全无视合并单元格、空行和多行表头引发的错位
        const matrix = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
        if (matrix.length === 0) throw new Error("Excel 未包含任何可用数据。");

        // 🛡️ 第一步：智能列索引定位器
        let headerIndex = -1;
        let colMap = {};

        // 遍历前 10 行，抓取真正包含“单号”或“单据编号”的表头核心行
        for (let i = 0; i < Math.min(10, matrix.length); i++) {
          const row = matrix[i].map(cell => String(cell).replace(/[\s\r\n\t]/g, ""));
          if (row.some(cell => cell.includes("单号") || cell.includes("单据编号"))) {
            headerIndex = i;
            // 锚定各列的具体物理位置 (0, 1, 2, 3...)
            row.forEach((cell, colIdx) => {
              if (cell.includes("单号")) colMap["order_no"] = colIdx;
              else if (cell.includes("单据编号")) colMap["doc_no"] = colIdx;
              else if (cell.includes("制单日期")) colMap["bill_date"] = colIdx;
              else if (cell.includes("客户编号")) colMap["customer_code"] = colIdx;
              else if (cell.includes("客户")) colMap["customer_name"] = colIdx;
              else if (cell.includes("商品编号")) colMap["sku_code"] = colIdx;
              else if (cell.includes("条形码") || cell === "条码") colMap["barcode"] = colIdx;
              else if (cell.includes("商品名称") || cell === "产品名称") colMap["product_name"] = colIdx;
              else if (cell === "包装") colMap["package_reg"] = colIdx;
              else if (cell === "件") colMap["qty_piece"] = colIdx;
              else if (cell === "1") colMap["amount_piece"] = colIdx;
              else if (cell === "散") colMap["qty_scatter"] = colIdx;
              else if (cell === "2") colMap["unit"] = colIdx;
              else if (cell === "3") colMap["amount_scatter"] = colIdx;
              else if (cell.includes("折扣")) colMap["discount"] = colIdx;
              else if (cell.includes("应收款")) colMap["total_amount"] = colIdx;
            });
            break;
          }
        }

        if (headerIndex === -1 || !colMap["order_no"]) {
          throw new Error("扫描失败：未在 Excel 前 10 行中找到包含【单号】或【单据编号】的标题行。");
        }

        statusMsg.innerText = "列定位成功，正在按物理坐标清洗数据...";
        const batchId = "BATCH_" + Date.now();
        const safePayloads = [];

        // 从标题行的下一行开始，进行绝对坐标提取
        for (let i = headerIndex + 1; i < matrix.length; i++) {
          const rowData = matrix[i];
          
          // 提取单号，如果这一行没有单号或者是空行则直接跳过
          let orderNoIdx = colMap["order_no"];
          let orderNo = rowData[orderNoIdx] ? String(rowData[orderNoIdx]).trim() : "";
          if (!orderNo || orderNo === "undefined" || orderNo === "null" || orderNo === "") {
            continue; 
          }

          // 借助坐标映射机进行强转换
          let cleanRow = {
            import_batch_id: batchId,
            is_processed: false,
            order_no: orderNo,
            doc_no: colMap["doc_no"] !== undefined ? String(rowData[colMap["doc_no"]] || "").trim() : "",
            bill_date: colMap["bill_date"] !== undefined ? String(rowData[colMap["bill_date"]] || "").trim() : "",
            customer_code: colMap["customer_code"] !== undefined ? String(rowData[colMap["customer_code"]] || "").trim() : "",
            customer_name: colMap["customer_name"] !== undefined ? String(rowData[colMap["customer_name"]] || "").trim() : "",
            sku_code: colMap["sku_code"] !== undefined ? String(rowData[colMap["sku_code"]] || "").trim() : "",
            barcode: colMap["barcode"] !== undefined ? String(rowData[colMap["barcode"]] || "").trim() : "",
            product_name: colMap["product_name"] !== undefined ? String(rowData[colMap["product_name"]] || "").trim() : "",
            unit: colMap["unit"] !== undefined ? String(rowData[colMap["unit"]] || "").trim() : "",
            
            // 数值字段空值防御
            package_reg: colMap["package_reg"] !== undefined ? (Number(rowData[colMap["package_reg"]]) || 0) : 0,
            qty_piece: colMap["qty_piece"] !== undefined ? (Number(rowData[colMap["qty_piece"]]) || 0) : 0,
            amount_piece: colMap["amount_piece"] !== undefined ? (Number(rowData[colMap["amount_piece"]]) || 0) : 0,
            qty_scatter: colMap["qty_scatter"] !== undefined ? (Number(rowData[colMap["qty_scatter"]]) || 0) : 0,
            amount_scatter: colMap["amount_scatter"] !== undefined ? (Number(rowData[colMap["amount_scatter"]]) || 0) : 0,
            discount: colMap["discount"] !== undefined ? (Number(rowData[colMap["discount"]]) || 0) : 0,
            total_amount: colMap["total_amount"] !== undefined ? (Number(rowData[colMap["total_amount"]]) || 0) : 0
          };

          // ====================================================================
          // 🛑 核心业务多特例拦截：多条码防护
          // ====================================================================
          if (SPECIAL_PRODUCTS_MAP[cleanRow.barcode]) {
            cleanRow.is_triple_spec_direct = true; // 激活特殊跳过中盒标记
          } else {
            cleanRow.is_triple_spec_direct = false;
          }

          safePayloads.push(cleanRow);
        }

        if (safePayloads.length === 0) {
          throw new Error("未能从定位后的数据列中分离出有效数据，请检查 Excel 格式。");
        }

        statusMsg.innerText = `正在安全写入 Supabase... (有效行: ${safePayloads.length} 条)`;

        // 发送给 Supabase
        const { error: upsertError } = await window.mySupabaseInstance
          .from('raw_dealer_outbounds')
          .upsert(safePayloads, { onConflict: 'order_no' });

        if (upsertError) throw upsertError;

        statusMsg.innerText = "数据导入完成。";
        alert(`🎉 强力对齐导入成功！\n本次通过物理列坐标共精准导入数据: ${safePayloads.length} 条。\n规格错乱商品已自动完成策略标记。`);
        
        fileInfo.style.display = 'none';
        selectedFile = null;
        submitBtn.disabled = true;
      } catch (err) {
        console.error(err);
        statusMsg.innerText = "导入失败";
        alert(`导入终止，原因: ${err.message || '未知错误'}`);
        submitBtn.disabled = false;
      }
    };
    reader.readAsArrayBuffer(selectedFile);
  }
</script>
</body>
</html>
