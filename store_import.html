<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>车销系统 - 门店主档智能筛选导入</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #1e3a8a; --bg-main: #f8fafc; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg-main); color: #0f172a; }
    .container { max-width: 600px; margin: 40px auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
    h2 { margin-top: 0; color: var(--primary); font-size: 22px; }
    .p-tip { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .upload-box { border: 2px dashed #cbd5e1; background: #f8fafc; padding: 60px 20px; border-radius: 12px; cursor: pointer; position: relative; }
    .upload-box.dragover { border-color: #3b82f6; background: #eff6ff; }
    .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .btn-submit { margin-top: 24px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; }
    .status { margin-top: 15px; font-size: 14px; color: #475569; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🏢 门店主档智能过滤导入</h2>
    <p class="p-tip">请直接拖入大厂导出的完整门店总表（Excel）。系统将自动识别并仅保留属于我方特殊业务员的门店。</p>
    
    <div class="upload-box" id="dropZone">
      <div style="font-size: 40px; margin-bottom: 10px;">📊</div>
      <div style="font-weight: 600;">点击或将门店总表 Excel 拖到此处</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="status" class="status"></div>
    <button id="submitBtn" class="btn-submit" disabled onclick="uploadToRPC()">🚀 开始智能筛选并导入后端</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔗 填入你新项目的 Supabase 秘钥
  const SUPABASE_URL = ""; 
  const SUPABASE_KEY = ""; 
  const client = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  let rawJsonData = null;

  // 接管拖拽
  ;['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => e.preventDefault(), false));
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  
  dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) parseExcel(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) parseExcel(e.target.files[0]);
  });

  // 读取 Excel 并以“最快速度转换为纯 JSON”
  function parseExcel(file) {
    statusDiv.innerText = "⏳ 正在读取本地大文件...";
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      // 核心：无脑转成原始 JSON 数组，不做任何格式、映射处理，降低网页内存负担
      rawJsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      
      statusDiv.innerText = `📂 已锁定文件，共检测到 ${rawJsonData.length} 行原始数据`;
      submitBtn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
  }

  // 🚀 【核心改变】：不经过网页处理，直接高空抛物砸给后台 RPC 函数
  async function uploadToRPC() {
    if (!rawJsonData || !client) return;
    submitBtn.disabled = true;
    statusDiv.innerText = "⚡ 正在向 Supabase 后端输送原始大表数据...";

    try {
      // 调用我们在第一步创建的 RPC 储过程
      const { data, error } = await client.rpc('import_and_filter_stores', { 
        p_store_json: rawJsonData 
      });

      if (error) throw error;

      statusDiv.innerText = "✅ 导入完成！";
      alert(`🎉 过滤成功！\n系统已自动为您在海量数据中，精准筛选出了【${data.matched_count}】家属于我们专属车销人员的门店并完成导入！`);
      submitBtn.disabled = false;
    } catch (err) {
      console.error(err);
      statusDiv.innerText = "❌ 后端处理失败";
      alert(`错误: ${err.message}`);
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
