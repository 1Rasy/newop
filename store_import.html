<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>门店导入</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #0284c7; --bg-main: #f0f9ff; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg-main); color: #0f172a; }
    .container { max-width: 600px; margin: 40px auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(2,132,199,0.05); text-align: center; }
    h2 { margin-top: 0; color: var(--primary); font-size: 22px; font-weight: 800; }
    .p-tip { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .upload-box { border: 2px dashed #bae6fd; background: #f0f9ff; padding: 60px 20px; border-radius: 12px; cursor: pointer; position: relative; transition: all 0.2s; }
    .upload-box.dragover { border-color: var(--primary); background: #e0f2fe; }
    .upload-box:hover { border-color: var(--primary); }
    .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .btn-submit { margin-top: 24px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(2,132,199,0.2); }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
    .status { margin-top: 15px; font-size: 14px; color: #0369a1; font-weight: bold; min-height: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>门店导入</h2>
    <p class="p-tip">导入。</p>
    
    <div class="upload-box" id="dropZone">
      <div>📊</div>
      <div style="font-weight: 600; margin-top: 10px;">选择或拖拽原始 Excel 文件至此处</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="status" class="status">系统初始化中...</div>
    <button id="submitBtn" class="btn-submit" disabled onclick="executeFrontendWash()">执行数据清洗并差集覆盖导入</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG"; 
  const client = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  
  let rawExcelRows = null;
  let employeeWhitelist = new Set();

  async function initWhitelist() {
    if (!client) {
      statusDiv.innerText = "错误：Supabase 配置缺失";
      return;
    }
    try {
      const { data, error } = await client.from('employees').select('employee_code');
      
      if (error) {
        statusDiv.innerText = `数据库错误 [${error.code}]: ${error.message}`;
        console.error(error);
        return;
      }
      
      if (!data || data.length === 0) {
        statusDiv.innerText = "警告：employees 表中未检测到任何员工工号";
        return;
      }
      
      data.forEach(emp => {
        if (emp.employee_code) employeeWhitelist.add(String(emp.employee_code).trim());
      });
      
      statusDiv.innerText = `白名单加载就绪，已缓存 ${employeeWhitelist.size} 条员工记录。`;
    } catch (err) {
      console.error(err);
      statusDiv.innerText = `网络或系统异常: ${err.message || err}`;
    }
  }
  window.onload = initWhitelist;

  ;['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => e.preventDefault(), false));
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  
  dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) processExcelFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) processExcelFile(e.target.files[0]);
  });

  function processExcelFile(file) {
    if (employeeWhitelist.size === 0) {
      alert("基础白名单为空，中止操作");
      return;
    }
    statusDiv.innerText = "正在解析 Excel 文件...";
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      rawExcelRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      
      statusDiv.innerText = `文件解析成功，共计 ${rawExcelRows.length} 行数据，等待执行导入。`;
      submitBtn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
  }

  async function executeFrontendWash() {
    if (!rawExcelRows || !client) return;
    submitBtn.disabled = true;
    statusDiv.innerText = "正在执行本地白名单匹配与过滤...";

    let safePayloads = [];
    let seenStoreCodes = new Set();

    rawExcelRows.forEach(row => {
      let rawEmpCode = row['门店负责人员工号'];
      let rawStoreCode = row['ATOM门店编号'];
      let rawStoreName = row['门店名称'];

      if (rawEmpCode && rawStoreCode && rawStoreName) {
        let cleanEmpCode = String(rawEmpCode).trim().replace(/[\"\']/g, "");
        let cleanStoreCode = String(rawStoreCode).trim().replace(/[\"\']/g, "");

        if (employeeWhitelist.has(cleanEmpCode) && !seenStoreCodes.has(cleanStoreCode)) {
          seenStoreCodes.add(cleanStoreCode);
          safePayloads.push({
            employee_code: cleanEmpCode,
            atom_code: cleanStoreCode,
            store_name: String(rawStoreName).trim()
          });
        }
      }
    });

    if (safePayloads.length === 0) {
      statusDiv.innerText = "放弃导入：本次上传未清洗出任何有效的我方业务员门店。";
      alert("未发现我方特殊业务员的门店，取消后续导入流程。");
      submitBtn.disabled = false;
      return;
    }

    statusDiv.innerText = `过滤完成。合规记录共 ${safePayloads.length} 条。正在写入缓冲并触发差集比对...`;

    try {
      // 1. 确保清空临时缓冲表
      await client.from('temp_upload_assets').delete().neq('employee_code', '_clear_all_');

      // 2. 将清洗后的最新数据写入临时缓冲表
      const { error: insertTempError } = await client
        .from('temp_upload_assets')
        .insert(safePayloads);

      if (insertTempError) throw insertTempError;

      // 3. 调用 Supabase RPC 函数执行后端原子比对和软覆盖
      const { error: rpcError } = await client.rpc('sync_and_mask_assets');

      if (rpcError) throw rpcError;

      statusDiv.innerText = `同步成功！本次上报的 ${safePayloads.length} 家门店已就绪，未在此表中的历史旧门店已自动转为隐藏状态。`;
      alert("全量差集覆盖同步成功（历史缺失门店已安全隐藏）。");
      
    } catch (err) {
      console.error(err);
      statusDiv.innerText = "异常：数据库同步操作失败";
      alert(`导入失败: ${err.message}`);
    } finally {
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
