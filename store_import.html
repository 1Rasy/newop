<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专属车销门店资产提取系统（前端版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #0284c7; --bg-main: #f0f9ff; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg-main); color: #0f172a; }
    .container { max-width: 600px; margin: 40px auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(2,132,199,0.05); text-align: center; }
    h2 { margin-top: 0; color: var(--primary); font-size: 22px; font-weight: 800; }
    .p-tip { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .upload-box { border: 2px dashed #bae6fd; background: #f0f9ff; padding: 60px 20px; border-radius: 12px; cursor: pointer; position: relative; transition: all 0.2s; }
    .upload-box.dragover { border-color: var(--primary); background: #e0f2fe; }
    .upload-box:hover { border-color: var(--primary); }
    .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .btn-submit { margin-top: 24px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(2,132,199,0.2); }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
    .status { margin-top: 15px; font-size: 14px; color: #0369a1; font-weight: bold; min-height: 20px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🏢 专属车销门店资产提取（前端智能版）</h2>
    <p class="p-tip">直接拖入大厂导出的完整原始门店数据表。本页面将在本地通过白名单高速清洗，并在保存时自动全量覆盖旧数据。</p>
    
    <div class="upload-box" id="dropZone">
      <div style="font-size: 44px; margin-bottom: 10px;">📊</div>
      <div style="font-weight: 600;">选择或将完整门店原始 Excel 拖到这里</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="status" class="status">正在初始化系统，请稍候...</div>
    <button id="submitBtn" class="btn-submit" disabled onclick="executeFrontendWash()">🚀 执行本地白名单清洗并覆盖导入</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔗 换上你干净项目的真实连接信息
  const SUPABASE_URL = "https://wyjbnnqhiehjccmojbbg.supabase.co"; 
  const SUPABASE_KEY = "sb_publishable_WwTC7079N2e8ZQwPKUj-Gw_ewFiviFG"; 
  const client = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  
  let rawExcelRows = null;
  let employeeWhitelist = new Set(); // 核心：使用 Set 建立 O(1) 极速拦截字典

  // 页面初始化：先偷偷去后台捞取特殊的员工白名单工号
  async function initWhitelist() {
    if (!client) {
      statusDiv.innerText = "❌ 尚未配置 Supabase 密钥";
      return;
    }
    try {
      const { data, error } = await client.from('employees').select('employee_code');
      if (error) throw error;
      
      data.forEach(emp => {
        if (emp.employee_code) employeeWhitelist.add(String(emp.employee_code).trim());
      });
      
      statusDiv.innerText = `💡 专属白名单加载成功！当前系统已锁定 [${employeeWhitelist.size}] 名特殊业务员。`;
    } catch (err) {
      console.error(err);
      statusDiv.innerText = "❌ 白名单加载失败，请检查 employees 表是否存在";
    }
  }
  window.onload = initWhitelist;

  // 阻断浏览器默认行为
  ;['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => e.preventDefault(), false));
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  
  dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) processExcelFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) processExcelFile(e.target.files[0]);
  });

  // 本地极速解析 Excel
  function processExcelFile(file) {
    if (employeeWhitelist.size === 0) {
      alert("⚠️ 白名单为空！请先去 Supabase 的 employees 表里添加你的特殊车销人员工号！");
      return;
    }
    statusDiv.innerText = "⏳ 正在本地解析一万条数据，请勿关闭网页...";
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      rawExcelRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      
      statusDiv.innerText = `📂 成功装载！共 ${rawExcelRows.length} 行原始数据，等待白名单拦截`;
      submitBtn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
  }

  // 🚀 执行前端清洗、清空旧资产、写入新资产三连击
  async function executeFrontendWash() {
    if (!rawExcelRows || !client) return;
    submitBtn.disabled = true;
    statusDiv.innerText = "⚡ 正在执行本地毫秒级比对...";

    // 1. 【前端闪电战】：利用字典拦截清洗一万条数据
    let safePayloads = [];
    let seenStoreCodes = new Set(); // 顺便在前端做个去重，防止 Excel 里面有两行一模一样的门店

    rawExcelRows.forEach(row => {
      let rawEmpCode = row['门店负责人员工号'];
      let rawStoreCode = row['ATOM门店编号'];
      let rawStoreName = row['门店名称'];

      if (rawEmpCode && rawStoreCode && rawStoreName) {
        let cleanEmpCode = String(rawEmpCode).trim().replace(/[\"\']/g, "");
        let cleanStoreCode = String(rawStoreCode).trim().replace(/[\"\']/g, "");

        // 🎯 核心防线：如果在白名单集合里，并且这个门店还没处理过
        if (employeeWhitelist.has(cleanEmpCode) && !seenStoreCodes.has(cleanStoreCode)) {
          seenStoreCodes.add(cleanStoreCode);
          safePayloads.push({
            employee_code: cleanEmpCode,
            customer_code: cleanStoreCode,
            customer_name: String(rawStoreName).trim()
          });
        }
      }
    });

    statusDiv.innerText = `🔍 比对完成！从一万条中清洗出 ${safePayloads.length} 个属于我方业务员的有效门店。正在全量覆盖更新数据库...`;

    try {
      // 2. ⚡【覆盖机制】：先删掉整个白名单里所有人名下的旧门店资产
      const empCodeArr = Array.from(employeeWhitelist);
      const { error: deleteError } = await client
        .from('employee_store_assets')
        .delete()
        .in('employee_code', empCodeArr);

      if (deleteError) throw deleteError;

      // 3. 【全新写入】：如果没有清洗出有效门店，直接结束
      if (safePayloads.length === 0) {
        statusDiv.innerText = "✅ 数据已清空（本次大表中我方业务员名下无门店）";
        alert("🎉 更新完毕！本次大表中未发现我方特殊业务员的门店，系统已同步清空资产表！");
        submitBtn.disabled = false;
        return;
      }

      // 如果有有效数据，一次性批量往里塞
      const { error: insertError } = await client
        .from('employee_store_assets')
        .insert(safePayloads);

      if (insertError) throw insertError;

      statusDiv.innerText = `✅ 资产全量覆盖成功！最新落盘 [${safePayloads.length}] 家门店！`;
      alert(`🎉 纯前端清洗成功！\n系统已为您剔除闲杂人员，并将最新的【${safePayloads.length}】家专属车销门店覆盖同步至系统！`);
      
    } catch (err) {
      console.error(err);
      statusDiv.innerText = "❌ 覆盖落盘失败，请查看控制台报错";
      alert(`更新出错: ${err.message}`);
    } finally {
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
