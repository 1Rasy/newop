<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>专属车销门店资产提取系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    :root { --primary: #0284c7; --bg-main: #f0f9ff; --card-bg: #ffffff; }
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: var(--bg-main); color: #0f172a; }
    .container { max-width: 600px; margin: 40px auto; }
    .card { background: var(--card-bg); padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(2,132,199,0.05); text-align: center; }
    h2 { margin-top: 0; color: var(--primary); font-size: 22px; font-weight: 800; }
    .p-tip { color: #64748b; font-size: 14px; margin-bottom: 24px; }
    .upload-box { border: 2px dashed #bae6fd; background: #f0f9ff; padding: 60px 20px; border-radius: 12px; cursor: pointer; position: relative; transition: all 0.2s; }
    .upload-box.dragover { border-color: var(--primary); background: #e0f2fe; }
    .upload-box:hover { border-color: var(--primary); }
    .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .btn-submit { margin-top: 24px; width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(2,132,199,0.2); }
    .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }
    .status { margin-top: 15px; font-size: 14px; color: #0369a1; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>🏢 专属车销门店资产提取</h2>
    <p class="p-tip">请拖入大厂导出的完整原始门店数据表。系统将对照系统内的特殊员工白名单，自动提取并生成工号对应的门店资产表。</p>
    
    <div class="upload-box" id="dropZone">
      <div style="font-size: 44px; margin-bottom: 10px;">📊</div>
      <div style="font-weight: 600;">选择或将完整门店原始 Excel 拖到这里</div>
      <input type="file" id="excelFile" class="file-input" accept=".xlsx, .xls">
    </div>
    
    <div id="status" class="status"></div>
    <button id="submitBtn" class="btn-submit" disabled onclick="sendToSupabaseBackend()">🚀 执行白名单清洗并提取至新表</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 🔗 换上你干净项目的真实连接信息
  const SUPABASE_URL = ""; 
  const SUPABASE_KEY = ""; 
  const client = (SUPABASE_URL && SUPABASE_KEY) ? supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('excelFile');
  const submitBtn = document.getElementById('submitBtn');
  const statusDiv = document.getElementById('status');
  let rawExcelRows = null;

  // 阻断浏览器默认行为
  ;['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => e.preventDefault(), false));
  dropZone.addEventListener('dragover', () => dropZone.classList.add('dragover'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  
  dropZone.addEventListener('drop', e => {
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) processExcelFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files.length > 0) processExcelFile(e.target.files[0]);
  });

  // 读取 Excel 转为全量原始 JSON，网页不承担清洗过滤的计算工作
  function processExcelFile(file) {
    statusDiv.innerText = "⏳ 正在读取本地大表格...";
    const reader = new FileReader();
    reader.onload = function(e) {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      rawExcelRows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
      
      statusDiv.innerText = `📂 成功装载！共 ${rawExcelRows.length} 行原始数据，等待提取`;
      submitBtn.disabled = false;
    };
    reader.readAsArrayBuffer(file);
  }

  // 🚀 发送给 Supabase 后端过程
  async function sendToSupabaseBackend() {
    if (!rawExcelRows || !client) return;
    submitBtn.disabled = true;
    statusDiv.innerText = "⚡ 正在投递全量原始数据，由后台白名单机制筛选提取...";

    try {
      // 隔空高空抛物砸给 RPC 函数
      const { data, error } = await client.rpc('import_filtered_store_assets', { 
        p_raw_excel_json: rawExcelRows 
      });

      if (error) throw error;

      statusDiv.innerText = "✅ 提取并落盘成功！";
      alert(`🎉 提取完毕！\n系统已自动比对白名单，精准提取了【${data.matched_count}】家属于我方特殊业务员的门店放入了新表中！`);
      submitBtn.disabled = false;
    } catch (err) {
      console.error(err);
      statusDiv.innerText = "❌ 提取失败";
      alert(`提取出错: ${err.message}`);
      submitBtn.disabled = false;
    }
  }
</script>
</body>
</html>
